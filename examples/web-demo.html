<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Demo TSPL Bridge dari Browser</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; font-size: 15px; cursor: pointer; }
    #out { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
    #out.ok { display: block; background: #e6f6ea; color: #116329; }
    #out.err { display: block; background: #fdebec; color: #a40e26; }
  </style>
</head>
<body>
  <h1>Demo TSPL Bridge</h1>
  <p>Halaman ini mensimulasikan web app Anda: memanggil bridge di <code>http://127.0.0.1:9123</code> dari browser.</p>

  <label>API Key (lihat di aplikasi TSPL Print Bridge)</label>
  <input id="key" placeholder="API key" />
  <label>Nama produk</label>
  <input id="name" value="Kopi Arabika 250g" />
  <label>Barcode</label>
  <input id="code" value="8991234567890" />

  <button id="print">🖨️ Print Label (78×100)</button>
  <div id="out"></div>

  <script type="module">
    const out = document.getElementById("out");

    document.getElementById("print").addEventListener("click", async () => {
      out.className = "";
      try {
        const res = await fetch("http://127.0.0.1:9123/print", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Api-Key": document.getElementById("key").value.trim(),
          },
          body: JSON.stringify({
            label: { width: 78, height: 100, gap: 3, tear: true },
            elements: [
              { type: "box", x: 8, y: 8, xEnd: 616, yEnd: 792, thickness: 3 },
              { type: "text", x: 24, y: 32, content: document.getElementById("name").value, scale: 2 },
              { type: "bar", x: 8, y: 100, width: 608, height: 3 },
              { type: "barcode", x: 24, y: 140, content: document.getElementById("code").value, height: 100 },
              { type: "qrcode", x: 24, y: 320, content: "https://example.com/p/" + document.getElementById("code").value, cellWidth: 5 },
              { type: "text", x: 24, y: 560, content: "Dicetak dari browser via TSPL Bridge" },
            ],
          }),
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.error);
        out.className = "ok";
        out.textContent = "✓ Label terkirim ke printer";
      } catch (err) {
        out.className = "err";
        out.textContent = "✗ " + err.message;
      }
    });
  </script>
</body>
</html>
